          type: string
          format: uuid
          description: "ID of the parent goal this milestone belongs to."
        title:
          type: string
          description: "Milestone title describing the sub-task."
        sortOrder:
          type: integer
          description: "Display position within the goal. Lower numbers appear first."
        completed:
          type: boolean
          description: "`true` = milestone is done, `false` = still pending."
        completedAt:
          type: string
          format: date-time
          description: "Timestamp when the milestone was marked complete (ISO 8601). Null if not completed."
        createdAt:
          type: string
          format: date-time
