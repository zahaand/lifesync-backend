openapi: 3.1.0
info:
  title: LifeSync API
  description: |
    LifeSync Backend — habit and goal tracking platform.

    ## How to use this API
    1. **Register:** `POST /api/v1/auth/register` — create an account
    2. **Login:** `POST /api/v1/auth/login` — copy the `accessToken` from the response
    3. **Authorize:** click the **Authorize** button (top right of this page), paste the `accessToken`
    4. All authenticated endpoints will use your token automatically
    5. When the token expires (15 min): use `POST /api/v1/auth/refresh` with your `refreshToken` to get a new pair
  version: 1.0.0
  contact:
    name: zahaand

servers:
  - url: /

security: []

tags:
  - name: Auth
    description: Authentication endpoints (public)
  - name: User
    description: User profile management (authenticated)
  - name: Admin
    description: Admin user management (ADMIN role required)
  - name: Habit
    description: Habit tracking, completion logs, and streaks (authenticated)
  - name: Goal
    description: Goal management, milestones, habit-goal linking, and progress tracking (authenticated)

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      description: |
        Creates a new user account with email, username, and password.

        **Password requirements:** minimum 8 characters.

        **Username rules:** lowercase letters, digits, underscores, and hyphens only (`^[a-z0-9_-]+$`), 3–32 characters.

        **Email:** must be a valid email address, maximum 255 characters. Must be unique across all accounts.

        After successful registration, the account is created but you are **not** logged in.
        Use `POST /api/v1/auth/login` with your credentials to obtain access and refresh tokens.

        **How to test:**
        1. Send a POST request with email, username, and password
        2. Verify 201 response with user details
        3. Try registering again with the same email — expect 409
        4. Try registering with a password shorter than 8 chars — expect 400
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestDto'
            examples:
              standard:
                summary: Standard registration
                value:
                  email: alice@example.com
                  username: alice-dev
                  password: MySecure8+
      responses:
        '201':
          description: User registered successfully. Use `/auth/login` to obtain tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - Password shorter than 8 characters
            - Username shorter than 3 or longer than 32 characters
            - Username contains invalid characters (only `a-z`, `0-9`, `_`, `-` allowed)
            - Email format is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '409':
          description: |
            Conflict. Email or username is already registered by another account.
            Try a different email or username.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with credentials
      description: |
        Authenticates a user with their credentials and returns a token pair.

        The `identifier` field accepts **either** an email address or a username — the server
        determines which one was provided automatically.

        On success, the response contains:
        - `accessToken` — a short-lived JWT (RS256) valid for **15 minutes** (900 seconds). Include it in the `Authorization: Bearer <token>` header for all authenticated requests.
        - `refreshToken` — an opaque token valid for **7 days**. Use it with `POST /auth/refresh` to get a new token pair when the access token expires.

        **How to test:**
        1. Register an account first via `POST /auth/register`
        2. Send a login request with your email or username + password
        3. Copy the `accessToken` and click **Authorize** (top right) to paste it
        4. All authenticated endpoints will now work
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
            examples:
              loginWithEmail:
                summary: Login with email
                value:
                  identifier: alice@example.com
                  password: MySecure8+
              loginWithUsername:
                summary: Login with username
                value:
                  identifier: alice-dev
                  password: MySecure8+
      responses:
        '200':
          description: Login successful. Save both tokens — you will need the refreshToken later.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseDto'
        '401':
          description: |
            Invalid credentials. Either the identifier (email/username) does not exist
            or the password is incorrect. The error message is intentionally vague to
            prevent user enumeration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: |
            Account is banned or disabled by an administrator.
            The user cannot log in until the ban is lifted. Contact support.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a **new** access token and a **new** refresh token.

        **Refresh token rotation:** each time you call this endpoint, the old refresh token is
        immediately **revoked** and a new one is issued. You must always store and use the
        latest `refreshToken` from the response. Using an old (already-rotated) token will fail
        with 401.

        **How to test:**
        1. Log in via `POST /auth/login` and copy the `refreshToken`
        2. Call this endpoint with that refresh token
        3. Verify you get a new `accessToken` and a new `refreshToken`
        4. Try calling again with the **old** refresh token — expect 401
        5. Use the **new** refresh token for subsequent refreshes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequestDto'
            examples:
              refresh:
                summary: Refresh with token from login response
                value:
                  refreshToken: dGhpcyBpcyBhIHNhbXBsZSByZWZyZXNoIHRva2VuIHZhbHVl
      responses:
        '200':
          description: New token pair issued. Save the new `refreshToken` — the old one is now invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseDto'
        '401':
          description: |
            Invalid or expired refresh token. Possible reasons:
            - Token was already used (rotation — each token is single-use)
            - Token has expired (older than 7 days)
            - Token was revoked via logout
            The user must log in again with `POST /auth/login`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out (revoke refresh token)
      description: |
        Permanently revokes the provided refresh token, ending the session associated with it.

        **Important:** the `accessToken` is a stateless JWT and remains valid until it naturally
        expires (up to 15 minutes after the last issuance). There is no way to forcefully
        invalidate an access token — it will simply stop working after its TTL.

        **How to test:**
        1. Log in and copy the `refreshToken`
        2. Call this endpoint with the refresh token
        3. Verify 204 (no content) response
        4. Try refreshing with the same token via `POST /auth/refresh` — expect 401
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestDto'
            examples:
              logout:
                summary: Revoke a refresh token
                value:
                  refreshToken: dGhpcyBpcyBhIHNhbXBsZSByZWZyZXNoIHRva2VuIHZhbHVl
      responses:
        '204':
          description: Logout successful. The refresh token is permanently revoked.
        '401':
          description: |
            Invalid refresh token. The token may have already been revoked or does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/users/me:
    get:
      tags: [User]
      operationId: getMyProfile
      summary: Get current user profile
      description: |
        Returns the authenticated user's account and profile data, including display name,
        timezone, locale, and Telegram integration status.

        **Requires authentication.** Include the access token obtained from `POST /auth/login`
        in the `Authorization` header: `Authorization: Bearer <accessToken>`.

        **How to test:**
        1. Log in via `POST /auth/login` and copy the `accessToken`
        2. Click **Authorize** (top right) and paste the token
        3. Call this endpoint — you should see your profile data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile with account and personalization settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '401':
          description: |
            Not authenticated. Either no `Authorization` header was provided,
            or the access token is invalid/expired. Log in again or refresh the token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    patch:
      tags: [User]
      operationId: updateMyProfile
      summary: Update current user profile
      description: |
        Updates the authenticated user's profile using **JSON Merge Patch** semantics (RFC 7396):
        - Field present with a value → **updates** that field
        - Field absent from the request → **no change** (keeps current value)

        At least one field must be provided. You can update `displayName`, `timezone`, and/or `locale`
        in a single request.

        **How to test:**
        1. Call `GET /users/me` to see current values
        2. Send a PATCH with only `timezone` — verify only timezone changed
        3. Send a PATCH with both `displayName` and `locale` — verify both updated
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequestDto'
            examples:
              updateTimezone:
                summary: Update timezone only
                value:
                  timezone: America/New_York
              updateMultiple:
                summary: Update displayName and locale together
                value:
                  displayName: Alice Johnson
                  locale: en-US
      responses:
        '200':
          description: Profile updated. Returns the full profile with all current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - No fields provided (empty body)
            - Field value exceeds maximum length
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    delete:
      tags: [User]
      operationId: deleteMyAccount
      summary: Delete current user account
      description: |
        **Soft-deletes** the authenticated user's account. The account is deactivated and the
        user data is retained in the database, but the user can no longer log in (login will
        return 404).

        **This action cannot be undone via the API.** Contact support to reactivate.

        **How to test:**
        1. Log in and call this endpoint
        2. Verify 204 response
        3. Try logging in again with the same credentials — expect 404
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account soft-deleted. Login will no longer work for this account.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/users/me/telegram:
    put:
      tags: [User]
      operationId: connectTelegram
      summary: Connect Telegram account
      description: |
        Links a Telegram account to the authenticated user by storing the Telegram numeric chat ID.
        This enables Telegram-based notifications and reminders.

        **How to get your Telegram chat ID:**
        1. Open Telegram and search for `@userinfobot`
        2. Start a chat and send any message
        3. The bot replies with your numeric ID (e.g. `987654321`)
        4. Use that number as the `telegramChatId` value

        **How to test:**
        1. Get your Telegram chat ID using the method above
        2. Call this endpoint with the chat ID
        3. Verify the response includes `telegramChatId` in your profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectTelegramRequestDto'
            examples:
              connect:
                summary: Connect with a Telegram chat ID
                value:
                  telegramChatId: "987654321"
      responses:
        '200':
          description: Telegram connected. Returns the updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '400':
          description: |
            Validation error. The `telegramChatId` is missing or exceeds 50 characters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      summary: List all users
      description: |
        Returns a paginated list of all users in the system. **Requires ADMIN role.**

        **Query parameters:**
        - `status` — filter by account status: `active` (enabled, not deleted), `banned` (disabled by admin), `deleted` (soft-deleted by user). Omit to return all.
        - `search` — case-insensitive partial match on email or username. Example: `search=john` matches `john_doe`, `johnny`, `alice@john.com`.
        - `page` — 0-indexed page number (default: 0). First page is `page=0`.
        - `size` — number of results per page (default: 20, max: 100).

        Default sort order: `created_at DESC` (newest users first).

        **How to test:**
        1. Log in as an admin user
        2. Call `GET /admin/users` — see all users
        3. Try `GET /admin/users?status=active&search=alice&page=0&size=10`
        4. Log in as a regular user — expect 403
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, banned, deleted]
          description: "Filter by user status: `active` = enabled and not deleted, `banned` = disabled by admin, `deleted` = soft-deleted"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: "Case-insensitive partial match on email or username. Example: `john` matches `john_doe` and `alice@john.com`"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: "Page number, 0-indexed. First page is `page=0`"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: "Number of results per page (default: 20, max: 100)"
      responses:
        '200':
          description: Paginated user list sorted by `created_at DESC`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: |
            Forbidden. The authenticated user does not have the ADMIN role.
            Only admin accounts can access this endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/admin/users/{id}:
    get:
      tags: [Admin]
      operationId: getUserById
      summary: Get user by ID
      description: |
        Returns full account and profile details for a specific user. **Requires ADMIN role.**

        The response includes all profile fields plus admin-specific fields like `enabled`,
        `deletedAt`, and `telegramChatId`.

        Returns 404 if the user ID does not exist in the system.

        **How to test:**
        1. Call `GET /admin/users` to find a user ID
        2. Call this endpoint with that ID
        3. Try a random UUID — expect 404
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User UUID
      responses:
        '200':
          description: Full user details including profile and admin metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: |
            Forbidden. The authenticated user does not have the ADMIN role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            User not found. No user exists with the given UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/admin/users/{id}/ban:
    post:
      tags: [Admin]
      operationId: banUser
      summary: Ban a user
      description: |
        Bans a user by setting `enabled=false` and **immediately revoking all** their refresh tokens.
        **Requires ADMIN role.**

        The banned user's existing access token remains valid until it expires (up to 15 minutes),
        but they will lose access completely once it does — they cannot refresh or log in again
        while banned.

        **How to test:**
        1. Create a test user and log in as that user (save their tokens)
        2. Log in as admin and call this endpoint with the test user's ID
        3. Verify the response shows `enabled: false`
        4. Try refreshing the test user's token — expect 401
        5. Try logging in as the test user — expect 403
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the user to ban
      responses:
        '200':
          description: User banned. All refresh tokens revoked. Returns updated user details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: |
            Forbidden. The authenticated user does not have the ADMIN role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            User not found. No user exists with the given UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits:
    get:
      tags: [Habit]
      operationId: getHabits
      summary: List user habits
      description: |
        Returns a paginated list of the authenticated user's habits. Only **non-deleted** habits
        are returned. Soft-deleted habits are permanently excluded from this list.

        Use the `status` parameter to filter by active/inactive habits:
        - `status=active` — only habits that accept completions
        - `status=inactive` — only paused habits
        - Omit `status` — returns both active and inactive

        Sorted by `created_at DESC` (newest habits first).

        **How to test:**
        1. Create a few habits via `POST /habits`
        2. Call `GET /habits` — see all your habits
        3. Try `GET /habits?status=active&page=0&size=5`
        4. Deactivate a habit, then filter by `status=inactive` to confirm
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive]
          description: "Filter by habit status: `active` = accepting completions, `inactive` = paused"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: "Page number, 0-indexed"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: "Number of results per page (default: 20, max: 100)"
      responses:
        '200':
          description: Paginated list of non-deleted habits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitPageResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    post:
      tags: [Habit]
      operationId: createHabit
      summary: Create a new habit
      description: |
        Creates a new habit for the authenticated user.

        **Business rules:**
        - `frequency` is required: `DAILY` (every day), `WEEKLY` (once per week), or `CUSTOM` (specific days).
        - When `frequency=CUSTOM`, the `targetDaysOfWeek` array is **required** and must contain at least one day.
        - When `frequency=DAILY` or `WEEKLY`, `targetDaysOfWeek` is ignored if provided.
        - `reminderTime` is optional, format: `HH:mm` (24-hour). Examples: `"07:00"`, `"23:30"`, `"00:15"`.
        - `title` is required, 1–200 characters.
        - `description` is optional, free-text.

        The habit is created in **active** state (`isActive=true`) by default.

        **How to test:**
        1. Create a daily habit (see "Daily habit" example)
        2. Create a custom habit with specific days (see "Custom days habit" example)
        3. Try creating with `frequency=CUSTOM` but no `targetDaysOfWeek` — expect 400
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHabitRequestDto'
            examples:
              daily:
                summary: Daily habit (no target days needed)
                value:
                  title: Morning meditation
                  description: 10 minutes of mindfulness every day
                  frequency: DAILY
                  reminderTime: "07:00"
              custom:
                summary: Custom days habit (targetDaysOfWeek required)
                value:
                  title: Morning run
                  description: Run 5km
                  frequency: CUSTOM
                  targetDaysOfWeek:
                    - MONDAY
                    - WEDNESDAY
                    - FRIDAY
                  reminderTime: "07:00"
      responses:
        '201':
          description: Habit created successfully in active state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - `title` is missing or exceeds 200 characters
            - `frequency` is missing or not one of DAILY, WEEKLY, CUSTOM
            - `frequency=CUSTOM` but `targetDaysOfWeek` is missing or empty
            - `reminderTime` does not match `HH:mm` format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits/{id}:
    get:
      tags: [Habit]
      operationId: getHabit
      summary: Get habit by ID
      description: |
        Returns full details of a specific habit owned by the authenticated user.

        Returns 404 if the habit does not exist **or** belongs to another user.
        This prevents information leakage — you cannot determine whether a habit ID
        belongs to someone else or simply does not exist.

        **How to test:**
        1. Create a habit and note the `id` from the response
        2. Call this endpoint with that ID — see full details
        3. Try a random UUID — expect 404
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      responses:
        '200':
          description: Full habit details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found. Either the habit does not exist or it belongs to another user.
            The response is intentionally identical in both cases to prevent information leakage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      tags: [Habit]
      operationId: updateHabit
      summary: Update a habit
      description: |
        Updates one or more properties of an existing habit. Follows **JSON Merge Patch**
        semantics (RFC 7396):
        - Field present with a value → **updates** that field
        - Field absent from the request → **no change**
        - Field present with `null` → **clears** that field (for nullable fields like `description`, `reminderTime`, `targetDaysOfWeek`)

        At least one field must be provided.

        **How to test:**
        1. Create a habit and note the ID
        2. Update only the title (see "Update title only" example)
        3. Deactivate it (see "Deactivate habit" example)
        4. Clear the reminder (see "Clear reminderTime" example)
        5. Verify each change with `GET /habits/{id}`
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHabitRequestDto'
            examples:
              updateTitle:
                summary: Update title only
                value:
                  title: Evening meditation
              deactivate:
                summary: Deactivate habit (pause completions)
                value:
                  isActive: false
              clearReminder:
                summary: Clear reminderTime (set to null)
                value:
                  reminderTime: null
      responses:
        '200':
          description: Habit updated. Returns the full habit with all current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - No fields provided (empty body)
            - `title` exceeds 200 characters or is empty
            - `reminderTime` does not match `HH:mm` format
            - `frequency=CUSTOM` but `targetDaysOfWeek` is missing or empty
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      tags: [Habit]
      operationId: deleteHabit
      summary: Delete a habit
      description: |
        **Soft-deletes** a habit owned by the authenticated user. The habit is excluded from
        all list endpoints (`GET /habits`) but its data — including completion history and
        streak records — is retained in the database.

        After deletion, you **cannot** log new completions for this habit (it will return 404).

        **How to test:**
        1. Create a habit, log a few completions
        2. Delete the habit — verify 204
        3. Call `GET /habits` — the deleted habit should not appear
        4. Try completing the deleted habit — expect 404
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      responses:
        '204':
          description: Habit soft-deleted. Completion history and streak data are preserved.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits/{id}/complete:
    post:
      tags: [Habit]
      operationId: completeHabit
      summary: Log a habit completion
      description: |
        Logs a completion for a specific habit on a given date. Only **one completion per habit
        per date** is allowed. The streak is **automatically recalculated** after each completion.

        **Business rules:**
        - The `date` field accepts today or any past date in `YYYY-MM-DD` format.
        - The `note` field is optional — use it to record details (e.g. "5km in 25 minutes").
        - The habit must be **active** (`isActive=true`) to accept completions.
        - Returns 409 if a completion already exists for this habit on this date, or if the habit is inactive.

        **How to test:**
        1. Create an active habit
        2. Log a completion for today (see examples below)
        3. Try logging again for the same date — expect 409
        4. Deactivate the habit, then try completing — expect 409
        5. Check the streak via `GET /habits/{id}/streak`
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteHabitRequestDto'
            examples:
              withNote:
                summary: Completion with a note
                value:
                  date: "2026-03-30"
                  note: 5km in 25 minutes
              withoutNote:
                summary: Completion without a note
                value:
                  date: "2026-03-30"
      responses:
        '201':
          description: Completion logged. Streak recalculated automatically.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitLogResponseDto'
        '400':
          description: |
            Validation error. The `date` field is missing or not in `YYYY-MM-DD` format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '409':
          description: |
            Conflict. Possible reasons:
            - A completion already exists for this habit on this date (one per day limit)
            - The habit is inactive (`isActive=false`) and does not accept completions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits/{id}/complete/{logId}:
    delete:
      tags: [Habit]
      operationId: deleteHabitLog
      summary: Delete a completion log
      description: |
        Soft-deletes a specific completion log entry. The streak is **automatically recalculated**
        after deletion.

        The `logId` can be obtained from the `id` field in the `GET /habits/{id}/logs` response.

        **How to test:**
        1. Log a completion for a habit
        2. Call `GET /habits/{id}/logs` and copy a log `id`
        3. Delete it with this endpoint — verify 204
        4. Check `GET /habits/{id}/streak` — streak should be recalculated
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
        - name: logId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "Completion log UUID (from `GET /habits/{id}/logs` response)"
      responses:
        '204':
          description: Log soft-deleted. Streak recalculated automatically.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit or log not found. Either the habit ID or log ID does not exist,
            or the habit belongs to another user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits/{id}/logs:
    get:
      tags: [Habit]
      operationId: getHabitLogs
      summary: List completion logs for a habit
      description: |
        Returns a paginated list of completion log entries for a specific habit, sorted by
        `date DESC` (most recent first). Only **active** (non-deleted) logs are returned.

        Each log entry contains:
        - `id` — unique log identifier (use this as `logId` when deleting)
        - `date` — the completion date in ISO 8601 format (`YYYY-MM-DD`)
        - `note` — optional comment added during completion

        **How to test:**
        1. Log several completions for a habit on different dates
        2. Call this endpoint — verify logs appear in reverse chronological order
        3. Delete a log entry and call again — verify it no longer appears
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: "Page number, 0-indexed"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: "Number of results per page (default: 20, max: 100)"
      responses:
        '200':
          description: Paginated list of active completion logs, sorted by date DESC.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitLogPageResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/habits/{id}/streak:
    get:
      tags: [Habit]
      operationId: getHabitStreak
      summary: Get streak data for a habit
      description: |
        Returns streak statistics for a specific habit.

        **Response fields:**
        - `currentStreak` — number of consecutive days (for DAILY habits) ending today or yesterday where a completion was logged. Resets to **0** if the last log is more than 1 day ago.
        - `longestStreak` — the historical maximum streak ever achieved for this habit. Never decreases.
        - `lastLogDate` — the date of the most recent completion log (`YYYY-MM-DD`), or `null` if no completions exist.

        **How to test:**
        1. Create a habit and log completions for consecutive days
        2. Call this endpoint — `currentStreak` should match the number of days
        3. Skip a day, then check again — `currentStreak` should be 0
        4. `longestStreak` should still reflect the previous streak
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      responses:
        '200':
          description: Current and historical streak data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitStreakResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Habit not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals:
    get:
      tags: [Goal]
      operationId: getGoals
      summary: List user goals
      description: |
        Returns a paginated list of the authenticated user's goals. Only **non-deleted** goals
        are returned. Soft-deleted goals are permanently excluded from this list.

        Use the `status` parameter to filter by goal status:
        - `status=ACTIVE` — only goals in progress
        - `status=COMPLETED` — only goals that reached 100% progress
        - Omit `status` — returns both active and completed

        Sorted by `created_at DESC` (newest goals first).

        **How to test:**
        1. Create a few goals via `POST /goals`
        2. Call `GET /goals` — see all your goals
        3. Try `GET /goals?status=ACTIVE&page=0&size=5`
        4. Manually set a goal progress to 100% via `PATCH /goals/{goalId}/progress` — it becomes COMPLETED
        5. Filter by `status=COMPLETED` to confirm
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, COMPLETED]
          description: "Filter by goal status: `ACTIVE` = in progress, `COMPLETED` = reached 100% progress"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: "Page number, 0-indexed"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: "Number of results per page (default: 20, max: 100)"
      responses:
        '200':
          description: Paginated list of non-deleted goals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPageResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    post:
      tags: [Goal]
      operationId: createGoal
      summary: Create a new goal
      description: |
        Creates a new goal for the authenticated user.

        **Business rules:**
        - `title` is required, 1–200 characters.
        - `description` is optional, free-text.
        - `targetDate` is optional. Goals can be open-ended or have a specific deadline.
          Past dates are allowed (for retroactive goal records).
        - The goal is created with status `ACTIVE` and progress `0%`.
        - Progress is controlled via manual updates (`PATCH /goals/{goalId}/progress`)
          or automatic calculation from linked habits.

        **How to test:**
        1. Create a goal with title and target date (see "Goal with deadline" example)
        2. Verify 201 response with status ACTIVE and progress 0
        3. Create a goal without target date (see "Open-ended goal" example)
        4. Try creating without a title — expect 400
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalCreateRequestDto'
            examples:
              withDeadline:
                summary: Goal with deadline
                value:
                  title: Run a marathon
                  description: Complete a full 42km marathon by September
                  targetDate: "2026-09-15"
              openEnded:
                summary: Open-ended goal
                value:
                  title: Learn Spanish
                  description: Reach conversational fluency
      responses:
        '201':
          description: Goal created successfully with status ACTIVE and progress 0%.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - `title` is missing or exceeds 200 characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}:
    get:
      tags: [Goal]
      operationId: getGoal
      summary: Get goal with full details
      description: |
        Returns full details of a specific goal owned by the authenticated user,
        including milestones and linked habit IDs.

        Returns 404 if the goal does not exist **or** belongs to another user.
        This prevents information leakage — you cannot determine whether a goal ID
        belongs to someone else or simply does not exist.

        **How to test:**
        1. Create a goal and note the `id` from the response
        2. Call this endpoint with that ID — see full details including milestones and linkedHabitIds
        3. Add milestones and link habits, then call again to see them in the response
        4. Try a random UUID — expect 404
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      responses:
        '200':
          description: Full goal details including milestones and linked habit IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalDetailResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found. Either the goal does not exist or it belongs to another user.
            The response is intentionally identical in both cases to prevent information leakage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      tags: [Goal]
      operationId: updateGoal
      summary: Update a goal
      description: |
        Updates one or more properties of an existing goal. Follows **JSON Merge Patch**
        semantics (RFC 7396):
        - Field present with a value → **updates** that field
        - Field absent from the request → **no change**
        - Field present with `null` → **clears** that field (for nullable fields like `description`, `targetDate`)

        At least one field must be provided.

        **Note:** This endpoint updates goal metadata (title, description, targetDate, status).
        To update goal progress, use `PATCH /goals/{goalId}/progress` instead.

        **How to test:**
        1. Create a goal and note the ID
        2. Update only the title (see "Update title" example)
        3. Clear the description by sending `null` (see "Clear description" example)
        4. Change status to COMPLETED (see "Mark completed" example)
        5. Verify each change with `GET /goals/{goalId}`
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalUpdateRequestDto'
            examples:
              updateTitle:
                summary: Update title
                value:
                  title: Run a half-marathon
              clearDescription:
                summary: Clear description
                value:
                  description: null
              markCompleted:
                summary: Mark completed
                value:
                  status: COMPLETED
      responses:
        '200':
          description: Goal updated. Returns the full goal with all current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - No fields provided (empty body)
            - `title` exceeds 200 characters
            - `status` is not one of ACTIVE, COMPLETED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      tags: [Goal]
      operationId: deleteGoal
      summary: Delete a goal
      description: |
        **Soft-deletes** a goal owned by the authenticated user. The goal data is retained
        in the database but excluded from all listings and queries.

        Milestones belonging to this goal are also soft-deleted. Habit-goal links are
        removed via database cascade.

        **This action cannot be undone via the API.**

        **How to test:**
        1. Create a goal
        2. Call DELETE on it — expect 204
        3. Try `GET /goals/{goalId}` — expect 404
        4. Verify the goal is gone from `GET /goals` listing
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      responses:
        '204':
          description: Goal soft-deleted. It will no longer appear in listings.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}/progress:
    patch:
      tags: [Goal]
      operationId: updateGoalProgress
      summary: Manually update goal progress
      description: |
        Directly sets a goal's progress percentage (0–100). This is the **manual progress**
        endpoint, useful for goals without linked habits or when the user wants to override
        the automatic calculation.

        **Business rules:**
        - `progress` must be an integer between 0 and 100 (inclusive).
        - When progress reaches **100**, the goal status automatically changes to `COMPLETED`.
        - If the goal has linked habits, the next automatic recalculation (triggered by a
          habit completion) will **overwrite** this manual value.
        - A `GoalProgressUpdatedEvent` is published for downstream consumers.

        **Note:** This is distinct from `PATCH /goals/{goalId}` which updates metadata
        (title, description, targetDate, status). Use this endpoint specifically for progress.

        **How to test:**
        1. Create a goal (starts at progress 0%)
        2. Call this endpoint with `progress: 50` — verify 200 with progress 50
        3. Call with `progress: 100` — verify status changes to COMPLETED
        4. Try `progress: 150` — expect 400
        5. Try `progress: -1` — expect 400
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalProgressUpdateRequestDto'
            examples:
              halfwayDone:
                summary: Set progress to 50%
                value:
                  progress: 50
              completed:
                summary: Complete the goal
                value:
                  progress: 100
      responses:
        '200':
          description: Progress updated. Returns the full goal with new progress and possibly updated status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponseDto'
        '400':
          description: |
            Validation error. `progress` must be an integer between 0 and 100 (inclusive).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}/milestones:
    post:
      tags: [Goal]
      operationId: addMilestone
      summary: Add a milestone to a goal
      description: |
        Adds a new milestone (sub-task) to a goal. Milestones provide organizational
        structure within a goal but do **not** affect the goal's progress percentage.

        **Business rules:**
        - `title` is required, 1–200 characters.
        - `sortOrder` determines the display position (lower numbers first). Defaults to 0.
        - Milestones are created in incomplete state (`completed: false`).
        - The parent goal must exist and be owned by the authenticated user.

        **How to test:**
        1. Create a goal and note its ID
        2. Add milestones with different sort orders (see examples)
        3. Call `GET /goals/{goalId}` to see milestones in the response
        4. Try adding a milestone to a non-existent goal — expect 404
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MilestoneCreateRequestDto'
            examples:
              firstMilestone:
                summary: First milestone
                value:
                  title: Register for the race
                  sortOrder: 1
              secondMilestone:
                summary: Second milestone
                value:
                  title: Complete 10K training
                  sortOrder: 2
      responses:
        '201':
          description: Milestone created successfully in incomplete state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - `title` is missing or exceeds 200 characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}/milestones/{milestoneId}:
    patch:
      tags: [Goal]
      operationId: updateMilestone
      summary: Update a milestone
      description: |
        Updates a milestone's properties. Supports partial updates using JSON Merge Patch semantics.

        **Business rules:**
        - Set `completed: true` to mark the milestone as done (sets `completedAt` timestamp).
        - Set `completed: false` to uncheck the milestone (clears `completedAt`).
        - `title` and `sortOrder` can be updated independently.
        - Milestones do **not** affect goal progress — they are organizational only.
        - The parent goal must exist and be owned by the authenticated user.

        **How to test:**
        1. Add a milestone to a goal
        2. Mark it complete (see "Mark complete" example)
        3. Verify `completedAt` is set in the response
        4. Uncheck it (see "Uncheck" example) — `completedAt` should be null
        5. Update the title (see "Update title" example)
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Milestone UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MilestoneUpdateRequestDto'
            examples:
              markComplete:
                summary: Mark complete
                value:
                  completed: true
              uncheck:
                summary: Uncheck milestone
                value:
                  completed: false
              updateTitle:
                summary: Update title
                value:
                  title: Complete half-marathon training
                  sortOrder: 2
      responses:
        '200':
          description: Milestone updated. Returns the full milestone with all current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneResponseDto'
        '400':
          description: |
            Validation error. Possible reasons:
            - `title` exceeds 200 characters
            - No fields provided (empty body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal or milestone not found. Either the resource does not exist,
            the goal belongs to another user, or the milestone does not belong to this goal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      tags: [Goal]
      operationId: deleteMilestone
      summary: Delete a milestone
      description: |
        **Soft-deletes** a milestone from a goal. The milestone data is retained in the
        database but excluded from all listings.

        **How to test:**
        1. Add a milestone to a goal
        2. Call DELETE on it — expect 204
        3. Call `GET /goals/{goalId}` — the milestone should be gone from the list
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Milestone UUID
      responses:
        '204':
          description: Milestone soft-deleted.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal or milestone not found, or goal not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}/habits:
    post:
      tags: [Goal]
      operationId: linkHabitToGoal
      summary: Link a habit to a goal
      description: |
        Links an existing habit to a goal. Both the goal and the habit must be owned by the
        authenticated user. A habit can be linked to multiple goals, and a goal can have
        multiple linked habits.

        **Business rules:**
        - The user must own both the goal and the habit.
        - Duplicate links (same goal + habit combination) are rejected with 409.
        - After linking, goal progress is **immediately recalculated** using the frequency-aware
          formula based on all currently linked habits' completion logs.
        - If this is the first habit linked to the goal, the goal transitions from manual-only
          progress to automatic progress tracking.

        **How to test:**
        1. Create a goal and a habit
        2. Link the habit to the goal — expect 201
        3. Try linking the same habit again — expect 409
        4. Check `GET /goals/{goalId}` — the habit ID should appear in `linkedHabitIds`
        5. Complete the linked habit, then check goal progress — it should update automatically
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalHabitLinkRequestDto'
            examples:
              linkHabit:
                summary: Link a habit
                value:
                  habitId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '201':
          description: Habit linked to goal. Goal progress is immediately recalculated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalHabitLinkResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal or habit not found. Either the resource does not exist or it belongs to
            another user. The response is intentionally identical in both cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '409':
          description: |
            Conflict. This habit is already linked to this goal.
            Each habit can only be linked once per goal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    get:
      tags: [Goal]
      operationId: getGoalHabitLinks
      summary: List habits linked to a goal
      description: |
        Returns all habits currently linked to a goal. The goal must be owned by the
        authenticated user.

        **How to test:**
        1. Create a goal and link several habits to it
        2. Call this endpoint — see all linked habits with their link timestamps
        3. Unlink one, then call again — it should be gone
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
      responses:
        '200':
          description: List of habit-goal links for this goal.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GoalHabitLinkResponseDto'
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/goals/{goalId}/habits/{habitId}:
    delete:
      tags: [Goal]
      operationId: unlinkHabitFromGoal
      summary: Unlink a habit from a goal
      description: |
        Removes the link between a habit and a goal. The habit itself is not affected.

        **Business rules:**
        - After unlinking, goal progress is **immediately recalculated** from the remaining
          linked habits.
        - If no habits remain linked, the goal enters manual-only mode — progress retains
          its last value and is only changeable via `PATCH /goals/{goalId}/progress`.

        **How to test:**
        1. Link a habit to a goal
        2. Call DELETE to unlink — expect 204
        3. Call `GET /goals/{goalId}/habits` — the habit should be gone
        4. Check goal progress — it should be recalculated from remaining habits
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Goal UUID
        - name: habitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Habit UUID
      responses:
        '204':
          description: Habit unlinked from goal. Progress recalculated from remaining linked habits.
        '401':
          description: |
            Not authenticated. Access token is missing, invalid, or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: |
            Goal not found, goal not owned by the authenticated user, or the habit
            is not linked to this goal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token obtained from `POST /auth/login` or `POST /auth/refresh`. Include as: `Authorization: Bearer <token>`"

  schemas:
    RegisterRequestDto:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: "Valid email address. Must be unique across all accounts."
          example: user@example.com
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9_-]+$'
          description: "Unique username. Lowercase letters, digits, underscores, and hyphens only. 3–32 characters."
          example: john_doe
        password:
          type: string
          minLength: 8
          format: password
          description: "Account password. Minimum 8 characters."
          example: SecurePass1

    LoginRequestDto:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: "Email address or username. The server detects which one was provided."
          example: user@example.com
        password:
          type: string
          format: password
          description: "Account password."
          example: SecurePass1

    RefreshRequestDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: "Refresh token from the most recent login or refresh response. Each token is single-use — always use the latest one."

    LogoutRequestDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: "Refresh token to permanently revoke. After revocation, this token cannot be used again."

    UpdateProfileRequestDto:
      type: object
      minProperties: 1
      description: "At least one field must be provided. Only provided fields are updated (JSON Merge Patch semantics)."
      properties:
        displayName:
          type: string
          maxLength: 150
          description: "User's display name. Up to 150 characters."
          example: John Doe
        timezone:
          type: string
          maxLength: 50
          description: "IANA timezone identifier (e.g. `Europe/Moscow`, `America/New_York`)."
          example: Europe/Moscow
        locale:
          type: string
          maxLength: 10
          description: "BCP 47 locale tag (e.g. `ru-RU`, `en-US`)."
          example: ru-RU

    ConnectTelegramRequestDto:
      type: object
      required: [telegramChatId]
      properties:
        telegramChatId:
          type: string
          maxLength: 50
          description: "Numeric Telegram chat ID. Get it by messaging `@userinfobot` in Telegram."
          example: '123456789'

    TokenResponseDto:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: "JWT RS256 token. Include as: `Authorization: Bearer <token>`. Valid for 15 minutes."
        refreshToken:
          type: string
          description: "Opaque token. Store securely. Valid for 7 days. Rotated on each refresh — always save the latest one."
        expiresIn:
          type: integer
          description: "Access token TTL in seconds (900 = 15 minutes)."
          example: 900

    UserResponseDto:
      type: object
      required: [id, email, username, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique user identifier."
        email:
          type: string
          description: "User's email address."
        username:
          type: string
          description: "User's unique username."
        role:
          type: string
          enum: [USER, ADMIN]
          description: "User role. `USER` = regular user, `ADMIN` = administrator."
        createdAt:
          type: string
          format: date-time
          description: "Account creation timestamp (ISO 8601)."

    UserProfileResponseDto:
      type: object
      required: [id, email, username, role, timezone, locale, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique user identifier."
        email:
          type: string
          description: "User's email address."
        username:
          type: string
          description: "User's unique username."
        role:
          type: string
          enum: [USER, ADMIN]
          description: "User role. `USER` = regular user, `ADMIN` = administrator."
        displayName:
          type: string
          description: "User's display name. May be null if not set."
        timezone:
          type: string
          description: "IANA timezone identifier (e.g. `Europe/Moscow`)."
        locale:
          type: string
          description: "BCP 47 locale tag (e.g. `ru-RU`)."
        telegramChatId:
          type: string
          description: "Linked Telegram chat ID, or null if Telegram is not connected."
        createdAt:
          type: string
          format: date-time
          description: "Account creation timestamp (ISO 8601)."

    AdminUserResponseDto:
      type: object
      required: [id, email, username, role, enabled, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique user identifier."
        email:
          type: string
          description: "User's email address."
        username:
          type: string
          description: "User's unique username."
        role:
          type: string
          enum: [USER, ADMIN]
          description: "User role."
        enabled:
          type: boolean
          description: "`true` = account active, `false` = account banned by admin."
        displayName:
          type: string
          description: "User's display name."
        timezone:
          type: string
          description: "IANA timezone identifier."
        locale:
          type: string
          description: "BCP 47 locale tag."
        telegramChatId:
          type: string
          description: "Linked Telegram chat ID."
        createdAt:
          type: string
          format: date-time
          description: "Account creation timestamp (ISO 8601)."
        deletedAt:
          type: string
          format: date-time
          description: "Soft-deletion timestamp (ISO 8601). Null if account is not deleted."

    UserPageResponseDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserResponseDto'
          description: "List of users on the current page."
        totalElements:
          type: integer
          format: int64
          description: "Total number of users matching the filter criteria."
        totalPages:
          type: integer
          description: "Total number of pages."
        page:
          type: integer
          description: "Current page number (0-indexed)."
        size:
          type: integer
          description: "Page size (number of items per page)."

    DayOfWeekDto:
      type: string
      enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
      description: "Day of the week. Used in `targetDaysOfWeek` for CUSTOM frequency habits."

    CreateHabitRequestDto:
      type: object
      required: [title, frequency]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "Habit name. 1–200 characters."
        description:
          type: string
          description: "Optional detailed description of the habit."
        frequency:
          type: string
          enum: [DAILY, WEEKLY, CUSTOM]
          description: "`DAILY` = every day, `WEEKLY` = once per week, `CUSTOM` = specific days (requires `targetDaysOfWeek`)."
        targetDaysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeekDto'
          description: "**Required** when `frequency=CUSTOM`. List of days when the habit should be performed. Ignored for DAILY and WEEKLY."
        reminderTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: "Optional reminder time in `HH:mm` format (24-hour). Examples: `07:00`, `23:30`, `00:15`."
      example:
        title: Morning run
        description: Run 5km every morning
        frequency: CUSTOM
        targetDaysOfWeek:
          - MONDAY
          - WEDNESDAY
          - FRIDAY
        reminderTime: "07:00"

    UpdateHabitRequestDto:
      type: object
      minProperties: 1
      description: "At least one field must be provided. Follows JSON Merge Patch semantics (RFC 7396). Send `null` to clear optional fields."
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "New habit name. 1–200 characters."
        description:
          type:
            - string
            - 'null'
          description: "New description. Send `null` to clear."
        frequency:
          type: string
          enum: [DAILY, WEEKLY, CUSTOM]
          description: "New frequency. If changed to CUSTOM, `targetDaysOfWeek` must also be provided."
        targetDaysOfWeek:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/DayOfWeekDto'
          description: "New target days. Send `null` to clear. Required if frequency is CUSTOM."
        reminderTime:
          type:
            - string
            - 'null'
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: "New reminder time in `HH:mm` format. Send `null` to remove the reminder."
        isActive:
          type: boolean
          description: "Set to `false` to pause the habit (completions will be rejected). Set to `true` to reactivate."

    CompleteHabitRequestDto:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: "ISO 8601 date (`YYYY-MM-DD`). Can be today or a past date."
          example: '2026-03-30'
        note:
          type: string
          description: "Optional comment about this completion (e.g. duration, distance, mood)."
          example: 5km in 25 minutes

    HabitResponseDto:
      type: object
      required: [id, title, frequency, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique habit identifier."
        title:
          type: string
          description: "Habit name."
        description:
          type: string
          description: "Detailed description of the habit. May be null."
        frequency:
          type: string
          enum: [DAILY, WEEKLY, CUSTOM]
          description: "How often the habit should be performed."
        targetDaysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeekDto'
          description: "Target days for CUSTOM frequency habits. Empty or null for DAILY/WEEKLY."
        reminderTime:
          type: string
          description: "Reminder time in `HH:mm` format, or null if not set."
        isActive:
          type: boolean
          description: "`true` = habit is active and accepts completions. `false` = habit is paused, completions are rejected."
        createdAt:
          type: string
          format: date-time
          description: "Habit creation timestamp (ISO 8601)."

    HabitLogResponseDto:
      type: object
      required: [id, habitId, date, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique log entry identifier. Use as `logId` when deleting a completion."
        habitId:
          type: string
          format: uuid
          description: "ID of the habit this completion belongs to."
        date:
          type: string
          format: date
          description: "Completion date in ISO 8601 format (`YYYY-MM-DD`)."
        note:
          type: string
          description: "Optional comment added during completion. May be null."
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when this log entry was created (ISO 8601)."

    HabitStreakResponseDto:
      type: object
      required: [currentStreak, longestStreak]
      properties:
        currentStreak:
          type: integer
          description: "Consecutive days ending today or yesterday where a completion was logged. Resets to 0 if the streak is broken."
          example: 6
        longestStreak:
          type: integer
          description: "Historical maximum streak ever achieved for this habit. Never decreases."
          example: 14
        lastLogDate:
          type: string
          format: date
          description: "Date of the most recent completion log (`YYYY-MM-DD`). Null if no completions exist."

    HabitPageResponseDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/HabitResponseDto'
          description: "List of habits on the current page."
        totalElements:
          type: integer
          format: int64
          description: "Total number of habits matching the filter criteria."
        totalPages:
          type: integer
          description: "Total number of pages."
        page:
          type: integer
          description: "Current page number (0-indexed)."
        size:
          type: integer
          description: "Page size (number of items per page)."

    HabitLogPageResponseDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/HabitLogResponseDto'
          description: "List of completion logs on the current page."
        totalElements:
          type: integer
          format: int64
          description: "Total number of log entries for this habit."
        totalPages:
          type: integer
          description: "Total number of pages."
        page:
          type: integer
          description: "Current page number (0-indexed)."
        size:
          type: integer
          description: "Page size (number of items per page)."

    GoalCreateRequestDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "Goal title. 1–200 characters. Describes the long-term objective."
        description:
          type: string
          description: "Optional detailed description of the goal."
        targetDate:
          type: string
          format: date
          description: "Optional deadline for the goal in ISO 8601 format (`YYYY-MM-DD`). Past dates are allowed for retroactive records."

    GoalUpdateRequestDto:
      type: object
      minProperties: 1
      description: "At least one field must be provided. Follows JSON Merge Patch semantics (RFC 7396). Send `null` to clear optional fields."
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "New goal title. 1–200 characters."
        description:
          type:
            - string
            - 'null'
          description: "New description. Send `null` to clear."
        targetDate:
          type:
            - string
            - 'null'
          format: date
          description: "New target date in ISO 8601 format (`YYYY-MM-DD`). Send `null` to remove the deadline."
        status:
          type: string
          enum: [ACTIVE, COMPLETED]
          description: "New goal status. `ACTIVE` = in progress, `COMPLETED` = goal achieved."

    GoalProgressUpdateRequestDto:
      type: object
      required: [progress]
      properties:
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: "Goal progress percentage (0–100). Setting to 100 automatically changes goal status to COMPLETED."

    GoalResponseDto:
      type: object
      required: [id, title, status, progress, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique goal identifier."
        title:
          type: string
          description: "Goal title describing the long-term objective."
        description:
          type: string
          description: "Detailed goal description. May be null."
        targetDate:
          type: string
          format: date
          description: "Goal deadline in ISO 8601 format (`YYYY-MM-DD`). Null if no deadline is set."
        status:
          type: string
          enum: [ACTIVE, COMPLETED]
          description: "Current goal status. `ACTIVE` = in progress, `COMPLETED` = reached 100% progress."
        progress:
          type: integer
          description: "Current progress percentage (0–100). Updated automatically from linked habits or manually via the progress endpoint."
        createdAt:
          type: string
          format: date-time
          description: "Goal creation timestamp (ISO 8601)."

    GoalDetailResponseDto:
      type: object
      required: [id, title, status, progress, milestones, linkedHabitIds, createdAt]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique goal identifier."
        title:
          type: string
          description: "Goal title describing the long-term objective."
        description:
          type: string
          description: "Detailed goal description. May be null."
        targetDate:
          type: string
          format: date
          description: "Goal deadline in ISO 8601 format (`YYYY-MM-DD`). Null if no deadline is set."
        status:
          type: string
          enum: [ACTIVE, COMPLETED]
          description: "Current goal status. `ACTIVE` = in progress, `COMPLETED` = reached 100% progress."
        progress:
          type: integer
          description: "Current progress percentage (0–100). Updated automatically from linked habits or manually."
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/MilestoneResponseDto'
          description: "List of active (non-deleted) milestones for this goal, ordered by sortOrder."
        linkedHabitIds:
          type: array
          items:
            type: string
            format: uuid
          description: "List of habit UUIDs currently linked to this goal. Use `GET /habits/{id}` to fetch habit details."
        createdAt:
          type: string
          format: date-time
          description: "Goal creation timestamp (ISO 8601)."

    GoalPageResponseDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponseDto'
          description: "List of goals on the current page."
        totalElements:
          type: integer
          format: int64
          description: "Total number of goals matching the filter criteria."
        totalPages:
          type: integer
          description: "Total number of pages."
        page:
          type: integer
          description: "Current page number (0-indexed)."
        size:
          type: integer
          description: "Page size (number of items per page)."

    MilestoneCreateRequestDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "Milestone title. 1–200 characters. Describes a sub-task within the goal."
        sortOrder:
          type: integer
          default: 0
          description: "Display position of the milestone within the goal. Lower numbers appear first."

    MilestoneUpdateRequestDto:
      type: object
      minProperties: 1
      description: "At least one field must be provided. Supports partial updates."
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: "New milestone title. 1–200 characters."
        sortOrder:
          type: integer
          description: "New display position within the goal."
        completed:
          type: boolean
          description: "Set to `true` to mark milestone as done (sets `completedAt`). Set to `false` to uncheck (clears `completedAt`)."

    MilestoneResponseDto:
      type: object
