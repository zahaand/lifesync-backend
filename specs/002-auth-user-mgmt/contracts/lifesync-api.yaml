openapi: 3.1.0
info:
  title: LifeSync API
  description: LifeSync Backend — habit and goal tracking platform
  version: 0.1.0
  contact:
    name: zahaand

servers:
  - url: /api/v1
    description: Default server

security: []

tags:
  - name: Auth
    description: Authentication endpoints (public)
  - name: User
    description: User profile management (authenticated)
  - name: Admin
    description: Admin user management (ADMIN role required)

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      description: Creates a new user account with email, username, and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestDto'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '409':
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with credentials
      description: Authenticates with email or username + password. Returns access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseDto'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: Account banned or disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access token and a new refresh token (rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequestDto'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseDto'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out (revoke refresh token)
      description: Revokes the provided refresh token, ending the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestDto'
      responses:
        '204':
          description: Logout successful
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /users/me:
    get:
      tags: [User]
      operationId: getMyProfile
      summary: Get current user profile
      description: Returns the authenticated user's account and profile data.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    patch:
      tags: [User]
      operationId: updateMyProfile
      summary: Update current user profile
      description: Updates display name, timezone, and/or locale for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequestDto'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
    delete:
      tags: [User]
      operationId: deleteMyAccount
      summary: Delete current user account
      description: Soft-deletes the authenticated user's account.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /users/me/telegram:
    put:
      tags: [User]
      operationId: connectTelegram
      summary: Connect Telegram account
      description: Stores the Telegram chat ID for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectTelegramRequestDto'
      responses:
        '200':
          description: Telegram connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      summary: List all users
      description: Returns a paginated list of all users. Supports filtering by status and searching by email or username.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, banned, deleted]
          description: Filter by user status
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by email or username (partial match)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Page number (0-indexed)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Page size
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /admin/users/{id}:
    get:
      tags: [Admin]
      operationId: getUserById
      summary: Get user by ID
      description: Returns a specific user's account and profile details.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /admin/users/{id}/ban:
    post:
      tags: [Admin]
      operationId: banUser
      summary: Ban a user
      description: Disables the user's account and revokes all their refresh tokens.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponseDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '403':
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/refresh

  schemas:
    RegisterRequestDto:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: user@example.com
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9_-]+$'
          example: john_doe
        password:
          type: string
          minLength: 8
          format: password
          example: SecurePass1

    LoginRequestDto:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Email or username
          example: user@example.com
        password:
          type: string
          format: password
          example: SecurePass1

    RefreshRequestDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh token from login or previous refresh

    LogoutRequestDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh token to revoke

    UpdateProfileRequestDto:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 150
          example: John Doe
        timezone:
          type: string
          maxLength: 50
          example: Europe/Moscow
        locale:
          type: string
          maxLength: 10
          example: ru-RU

    ConnectTelegramRequestDto:
      type: object
      required: [telegramChatId]
      properties:
        telegramChatId:
          type: string
          maxLength: 50
          example: '123456789'

    TokenResponseDto:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min validity)
        refreshToken:
          type: string
          description: Refresh token (7 day validity)
        expiresIn:
          type: integer
          description: Access token TTL in seconds
          example: 900

    UserResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        createdAt:
          type: string
          format: date-time

    UserProfileResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        displayName:
          type: string
        timezone:
          type: string
        locale:
          type: string
        telegramChatId:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminUserResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        enabled:
          type: boolean
        displayName:
          type: string
        timezone:
          type: string
        locale:
          type: string
        telegramChatId:
          type: string
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time

    UserPageResponseDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserResponseDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    ErrorResponseDto:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
